render:
  type: web
  name: shuiku-ai
  runtime: python
  plan: free
  region: singapore
  buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
  startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
  envVars:
    - key: PYTHON_VERSION
      value: 3.10.12
    - key: JWT_SECRET
      generateValue: true
    - key: DATABASE_URL
      value: sqlite:///./shuiku.db
  autoDeploy: true
