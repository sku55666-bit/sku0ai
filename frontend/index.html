<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A1628" />
  <meta name="description" content="水库AI - 全球AI大模型聚合平台，一站式调用 GPT-5.5、Claude、Gemini-Omni、Grok 等主流 AI 模型" />
  <title>水库AI · 全球AI大模型一站调用</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* 页面专属样式（合并入主 css，但放这里方便管理） */
    /* ====== 模型网格 ====== */
    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    @media (max-width: 640px) {
      .model-grid { grid-template-columns: 1fr; }
    }

    /* ====== 步骤卡片 ====== */
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .step-card {
      position: relative;
      overflow: hidden;
    }
    .step-num {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    /* ====== CTA 卡片 ====== */
    .cta-card {
      text-align: center;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(6, 182, 212, 0.08) 100%);
      border-color: rgba(59, 130, 246, 0.3);
    }

    /* ====== 模型市场 ====== */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ====== Chat 页面 ====== */
    .chat-page {
      display: flex;
      height: calc(100vh - 64px);
      gap: 0;
    }
    .chat-sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 20px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .model-list-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .model-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all var(--duration-base) var(--ease);
      border: 1px solid transparent;
    }
    .model-list-item:hover {
      background: var(--bg-elevated);
    }
    .model-list-item.active {
      background: var(--color-primary-dim);
      border-color: var(--color-primary);
    }
    .model-list-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .model-list-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .model-list-price {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-primary);
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }
    .balance-display {
      text-align: right;
    }
    .chat-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .empty-state {
      max-width: 600px;
      margin: 60px auto;
      text-align: center;
    }
    .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      filter: grayscale(20%);
    }
    .empty-suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion-chip {
      padding: 8px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-base) var(--ease);
    }
    .suggestion-chip:hover {
      background: var(--color-primary-dim);
      border-color: var(--color-primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .input-area {
      padding: 16px 24px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }
    .input-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 8px 8px 8px 16px;
      transition: border-color var(--duration-base) var(--ease);
    }
    .input-box:focus-within {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-dim);
    }
    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
    }
    .image-input-row { margin-bottom: 12px; }
    .image-input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* 消息气泡 */
    .chat-messages { max-width: 800px; margin: 0 auto; }
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeIn 200ms var(--ease);
    }
    .message-user { flex-direction: row-reverse; }
    .message-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
      flex-shrink: 0;
    }
    .message-user .message-avatar {
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      color: white;
    }
    .message-assistant .message-avatar {
      background: linear-gradient(135deg, #5B5BFF, #06B6D4);
      color: white;
    }
    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--bg-elevated);
      color: var(--text-primary);
      line-height: 1.6;
      word-wrap: break-word;
    }
    .message-user .message-bubble {
      background: linear-gradient(135deg, var(--color-primary) 0%, #2563EB 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message-assistant .message-bubble {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }
    .message-meta {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .loading-bubble {
      display: flex;
      align-items: center;
      padding: 16px;
    }
    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-primary);
      animation: loadingDot 1.4s infinite var(--ease);
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadingDot {
      0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
      30% { transform: scale(1); opacity: 1; }
    }

    /* 图像结果 */
    .image-results { max-width: 900px; margin: 0 auto; }
    .image-result-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .image-result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }
    .image-grid {
      display: grid;
      gap: 12px;
    }
    .image-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-tertiary);
      aspect-ratio: 1;
    }
    .image-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.7) 100%);
      opacity: 0;
      transition: opacity var(--duration-base) var(--ease);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 12px;
    }
    .image-card:hover .image-overlay { opacity: 1; }

    /* 移动端 chat 适配 */
    @media (max-width: 768px) {
      .chat-page { flex-direction: column; height: calc(100vh - 56px - 70px); }
      .chat-sidebar {
        width: 100%;
        max-height: 160px;
        padding: 12px 16px;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      .model-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .model-list-title { display: none; }
      .model-list-item {
        flex-shrink: 0;
        min-width: 180px;
      }
      .chat-content { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
      .message-bubble { max-width: 85%; }
    }

    /* ====== 充值页 ====== */
    .balance-card {
      text-align: center;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.05) 0%, rgba(59, 130, 246, 0.05) 100%);
      border-color: rgba(6, 182, 212, 0.3);
    }
    .packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    @media (max-width: 768px) {
      .packages-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .packages-grid { grid-template-columns: 1fr; }
    }
    .package-card {
      position: relative;
      text-align: center;
      padding: 24px 16px;
    }
    .package-card.selected {
      border-color: var(--color-primary);
      background: var(--color-primary-dim);
      box-shadow: var(--shadow-glow);
    }
    .package-card.highlight::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      z-index: -1;
      opacity: 0.3;
      filter: blur(8px);
    }
    .package-tag {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      color: white;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .package-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .package-price {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .package-tokens {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .package-extra {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .package-rate {
      font-size: 11px;
      color: var(--text-muted);
    }

    .custom-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .custom-input-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      transition: border-color var(--duration-base) var(--ease);
    }
    .custom-input-group:focus-within {
      border-color: var(--color-primary);
    }
    .custom-prefix {
      font-size: 24px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-right: 4px;
    }
    .custom-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 0;
      font-size: 18px;
      color: var(--text-primary);
      font-family: "JetBrains Mono", monospace;
    }
    .custom-suffix {
      color: var(--text-muted);
      font-size: 16px;
    }
    .custom-amount-info {
      min-width: 140px;
    }

    .payment-icons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 12px;
    }
    .payment-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .payment-icon.active {
      border-color: var(--color-primary);
      color: var(--text-primary);
    }
    .payment-icon.disabled {
      opacity: 0.5;
    }
    .payment-icon-logo {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 12px;
    }
    .recharge-tips ul { list-style: disc; }
    .recharge-tips ul li { margin-bottom: 4px; }

    /* ====== 登录注册页 ====== */
    .auth-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    .auth-card {
      padding: 32px;
    }
    .auth-tips {
      margin-top: 20px;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
    }

    .otp-input-row {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }
    .otp-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      font-family: "JetBrains Mono", monospace;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      transition: all var(--duration-base) var(--ease);
    }
    .otp-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-dim);
    }
    @media (max-width: 480px) {
      .otp-input { width: 40px; height: 48px; font-size: 20px; }
    }

    .success-state {
      padding: 32px 0;
    }
    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--color-success-bg);
      color: var(--color-success);
      font-size: 36px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: successPop 400ms var(--ease);
    }
    @keyframes successPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ====== 个人中心 ====== */
    .profile-header {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
    }
    .profile-avatar-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      box-shadow: var(--shadow-glow);
    }
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }
    .stat-card {
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      text-align: center;
    }

    .table-responsive {
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th {
      text-align: left;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: var(--bg-tertiary); }
    @media (max-width: 768px) {
      .data-table th, .data-table td { padding: 8px 12px; font-size: 13px; }
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      border: 2px solid var(--bg-elevated);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 移动端菜单 nav 内的图标 */
    .nav-item { display: flex; align-items: center; }

    /* 主页面 hidden */
    body.loading .page { display: none; }
  </style>
</head>
<body class="loading">
  <!-- 顶部导航 -->
  <header class="app-header" id="app-header"></header>

  <!-- 6 个页面 -->
  <main>
    <div id="page-home" class="page"></div>
    <div id="page-market" class="page"></div>
    <div id="page-chat" class="page"></div>
    <div id="page-recharge" class="page"></div>
    <div id="page-auth" class="page"></div>
    <div id="page-profile" class="page"></div>
  </main>

  <!-- 脚本 -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/page-home.js"></script>
  <script src="js/page-market.js"></script>
  <script src="js/page-chat.js"></script>
  <script src="js/page-recharge.js"></script>
  <script src="js/page-auth.js"></script>
  <script src="js/page-profile.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 加载完成后移除 body.loading
    setTimeout(() => document.body.classList.remove('loading'), 100);
  </script>
</body>
</html>
